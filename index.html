<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Clientes - Supabase</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="navbar navbar-dark bg-primary sticky-top mb-3">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">Meus Clientes</span>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="listaClientes" class="row g-3">
            <div class="empty-state">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Carregando clientes...</p>
            </div>
        </div>
    </div>

    <button class="btn btn-primary btn-float" data-bs-toggle="modal" data-bs-target="#modalCliente" onclick="limparForm()">
        <i class="bi bi-plus-lg"></i>
    </button>

    <div class="modal fade" id="modalCliente" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitulo">Novo Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="clienteId">
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">NOME</label>
                        <input type="text" id="nome" class="form-control form-control-lg" placeholder="Ex: João Silva">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-secondary small fw-bold">E-MAIL</label>
                        <input type="email" id="email" class="form-control form-control-lg" placeholder="joao@email.com">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary px-4" onclick="salvarCliente()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalDetalhes" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center pt-0 pb-4">
                    <div class="mb-3 mt-2">
                        <i class="bi bi-person-circle display-1 text-secondary opacity-50"></i>
                    </div>
                    <h4 id="detalheNome" class="fw-bold mb-1 text-dark">Nome</h4>
                    <p id="detalheEmail" class="text-muted mb-4">email</p>
                    
                    <div class="d-grid gap-2">
                        <button id="btnEditar" class="btn btn-primary btn-lg">
                            <i class="bi bi-pencil-square me-2"></i>Editar
                        </button>
                        <button id="btnDeletar" class="btn btn-light text-danger btn-lg">
                            <i class="bi bi-trash3 me-2"></i>Excluir
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalConfirmarExclusao" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center p-4">
                    <div class="mb-3">
                        <i class="bi bi-exclamation-triangle-fill text-warning icone-animado" style="font-size: 4rem;"></i>
                    </div>
                    <h5 class="fw-bold mb-2">Excluir cliente?</h5>
                    <p class="text-muted mb-4 small">Esta ação é permanente e não poderá ser desfeita.</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn btn-light w-50" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-danger w-50" id="btnAcaoExcluir">Excluir</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar fixed-bottom bg-white border-top shadow-sm pb-2 pt-1">
        <div class="container-fluid d-flex justify-content-around px-0">
            <a href="#" class="text-decoration-none text-center text-muted w-100 py-1">
                <i class="bi bi-grid fs-4 d-block mb-1"></i>
                <span class="d-block" style="font-size: 0.75rem;">Dashboard</span>
            </a>
            
            <a href="#" class="text-decoration-none text-center text-primary w-100 py-1">
                <i class="bi bi-people-fill fs-4 d-block mb-1"></i>
                <span class="d-block fw-bold" style="font-size: 0.75rem;">Clientes</span>
            </a>
            
            <a href="#" class="text-decoration-none text-center text-muted w-100 py-1">
                <i class="bi bi-gear fs-4 d-block mb-1"></i>
                <span class="d-block" style="font-size: 0.75rem;">Ajustes</span>
            </a>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="script.js"></script>

</body>
</html>
